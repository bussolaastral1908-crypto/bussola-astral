*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Lora',serif}

.logo p{font-size:0.8rem;color:var(--muted);letter-spacing:0.18em;text-transform:uppercase;margin-top:0.4rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.2rem 2rem 2.4rem;width:100%;max-width:420px;
  backdrop-filter:blur(14px);box-shadow:0 8px 40px rgba(0,0,0,0.45),inset 0 1px 0 rgba(160,111,240,0.1)}
.card-title{font-family:'Playfair Display SC',serif;font-size:1.35rem;text-align:center;margin-bottom:0.25rem}
.card-sub{font-size:0.88rem;color:var(--muted);text-align:center;font-style:italic;margin-bottom:1.8rem}
.form-grid{display:grid;gap:1rem}
.field label{display:block;font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem}
.field input{width:100%;background:rgba(11,11,24,0.65);border:1px solid rgba(124,63,228,0.22);border-radius:8px;
  padding:0.68rem 0.9rem;color:var(--text);font-family:'Lora',serif;font-size:0.95rem;transition:border-color .2s,box-shadow .2s;outline:none}
.field input:focus{border-color:var(--purple-light);box-shadow:0 0 0 3px rgba(160,111,240,0.15)}
.field input::placeholder{color:rgba(154,141,176,0.45)}
.field.err input{border-color:var(--error)}
.field .emsg{font-size:0.7rem;color:var(--error);margin-top:0.28rem;display:none}
.field.err .emsg{display:block}
.forgot{text-align:right;margin-top:-0.5rem}
.forgot a{font-size:0.78rem;color:var(--muted);text-decoration:none;transition:color .2s}
.forgot a:hover{color:var(--purple-light)}
.btn{width:100%;padding:0.88rem;background:linear-gradient(135deg,#7c3fe4,#5b2db5);border:none;border-radius:10px;
  color:#fff;font-family:'Cinzel',serif;font-size:0.93rem;font-weight:700;letter-spacing:0.1em;cursor:pointer;
  transition:opacity .2s,transform .1s;margin-top:0.3rem}
.btn:hover{opacity:0.9}.btn:active{transform:scale(0.99)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.link-row{text-align:center;margin-top:1.1rem;font-size:0.84rem;color:var(--muted)}
.link-row a{color:var(--purple-light);text-decoration:none;font-weight:600}
.link-row a:hover{text-decoration:underline}
.alert{padding:0.8rem 1rem;border-radius:8px;font-size:0.86rem;margin-top:0.8rem;display:none;line-height:1.5}
.alert.ok{background:rgba(63,207,142,0.1);border:1px solid rgba(63,207,142,0.3);color:var(--ok);display:block}
.alert.bad{background:rgba(224,85,101,0.1);border:1px solid rgba(224,85,101,0.3);color:var(--error);display:block}
/* Reset modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:100;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal{background:#16112e;border:1px solid rgba(124,63,228,0.4);border-radius:14px;padding:1.8rem;width:100%;max-width:380px;
  box-shadow:0 10px 40px rgba(0,0,0,0.5)}
.modal h3{font-family:'Playfair Display SC',serif;font-size:1.1rem;margin-bottom:0.5rem;text-align:center}
.modal p{font-size:0.85rem;color:var(--muted);text-align:center;margin-bottom:1.2rem;line-height:1.6}
.modal .field{margin-bottom:1rem}
.modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.btn-ghost{padding:0.65rem;background:transparent;border:1px solid rgba(124,63,228,0.35);border-radius:8px;
  color:var(--muted);font-family:'Cinzel',serif;font-size:0.8rem;cursor:pointer;transition:border-color .2s,color .2s}
.btn-ghost:hover{border-color:var(--purple-light);color:var(--text)}
</style>

<!-- Reset password modal -->
<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <h3>Recuperar senha</h3>
    <p>Informe seu email e enviaremos um link para redefinir sua senha.</p>
    <div class="field">
      <label for="reset-email">Email</label>
      <input type="email" id="reset-email" placeholder="seu@email.com"/>
    </div>
    <div id="reset-alert" class="alert"></div>
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeReset()">Cancelar</button>
      <button class="btn" id="btnReset" onclick="sendReset()">Enviar link</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="logo">
    <h1>✦ BÚSSOLA ASTRAL ✦</h1>
    <p>Acesse seu mapa astral</p>
  </div>

  <div class="card">
    <h2 class="card-title">Entrar</h2>
    <p class="card-sub">Bem-vindo de volta às estrelas</p>

    <form id="loginForm" class="form-grid" novalidate>

      <div class="field" id="f-email">
        <label for="inp-email">Email</label>
        <input type="email" id="inp-email" placeholder="seu@email.com" autocomplete="email" required/>
        <div class="emsg">Informe um email válido.</div>
      </div>

      <div class="field" id="f-pass">
        <label for="inp-pass">Senha</label>
        <input type="password" id="inp-pass" placeholder="Sua senha" autocomplete="current-password" required/>
        <div class="emsg">Informe sua senha.</div>
      </div>

      <div class="forgot">
        <a href="#" onclick="openReset();return false">Esqueci minha senha</a>
      </div>

      <div id="alertBox" class="alert"></div>

      <button type="submit" class="btn" id="btnLogin">✦ Entrar</button>
    </form>

    <div class="link-row">Não tem conta? <a href="/cadastro.html">Criar conta grátis</a></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SB_URL='https://jnjdkfmzkppzqafhjsbl.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpuamRrZm16a3BwenFhZmhqc2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwMDg1MTEsImV4cCI6MjA5NzU4NDUxMX0.xpBcvJ2y6Mj3mL5HrO_XVuj-YD3RIW3P1dMWY_H16y4';
const db=supabase.createClient(SB_URL,SB_KEY);

function showAlert(msg,type){const el=document.getElementById('alertBox');el.textContent=msg;el.className='alert '+type}
function clrAlert(){const el=document.getElementById('alertBox');el.className='alert';el.textContent=''}
function fe(id,show){document.getElementById(id).classList.toggle('err',show)}

document.getElementById('loginForm').addEventListener('submit',async(e)=>{
  e.preventDefault();clrAlert();
  const email=document.getElementById('inp-email').value.trim();
  const pass=document.getElementById('inp-pass').value;
  let ok=true;
  fe('f-email',!email||!email.includes('@'));if(!email||!email.includes('@'))ok=false;
  fe('f-pass',!pass);if(!pass)ok=false;
  if(!ok)return;

  const btn=document.getElementById('btnLogin');
  btn.disabled=true;btn.textContent='Entrando...';

  const{error}=await db.auth.signInWithPassword({email,password:pass});

  if(error){
    const msg=error.message.includes('Invalid login')
      ?'Email ou senha incorretos.'
      :error.message.includes('Email not confirmed')
      ?'Confirme seu email antes de entrar.'
      :'Erro: '+error.message;
    showAlert(msg,'bad');
    btn.disabled=false;btn.textContent='✦ Entrar';
    return;
  }

  showAlert('✓ Login realizado! Redirecionando...','ok');
  setTimeout(()=>window.location.href='/horoscopo.html',1000);
});

// Já logado? Redireciona direto
db.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='/horoscopo.html'});

// Reset password
function openReset(){
  document.getElementById('resetModal').classList.add('open');
  document.getElementById('reset-email').focus();
}
function closeReset(){
  document.getElementById('resetModal').classList.remove('open');
  const el=document.getElementById('reset-alert');el.className='alert';el.textContent='';
}
async function sendReset(){
  const email=document.getElementById('reset-email').value.trim();
  const el=document.getElementById('reset-alert');
  if(!email){el.textContent='Informe seu email.';el.className='alert bad';return}
  const btn=document.getElementById('btnReset');
  btn.disabled=true;btn.textContent='Enviando...';
  const{error}=await db.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/redefinir-senha.html'});
  if(error){el.textContent='Erro: '+error.message;el.className='alert bad';}
  else{el.textContent='✓ Link enviado! Verifique seu email.';el.className='alert ok';}
  btn.disabled=false;btn.textContent='Enviar link';
}
document.getElementById('resetModal').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeReset()});
</script>
</body>
