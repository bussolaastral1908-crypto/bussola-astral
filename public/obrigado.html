<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bem-vindo ao Premium — Bússola Astral</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Georgia', serif;
    background: #0a0a1a;
    color: #e8dcc8;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .logo { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 2rem; color: #d4af37; margin-bottom: 1rem; }
  p { font-size: 1.1rem; color: #b0a090; margin-bottom: 2rem; max-width: 500px; }
  .btn {
    background: linear-gradient(135deg, #d4af37, #b8860b);
    color: #0a0a1a;
    padding: 1rem 2.5rem;
    border-radius: 50px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.1rem;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
</style>
</head>
<body>
  <div class="logo">🧭✨</div>
  <h1>Bem-vindo ao Bússola Astral Premium!</h1>
  <p>Seu acesso foi ativado com sucesso. Agora você tem acesso completo às previsões astrológicas personalizadas.</p>
  <a href="/" class="btn">Acessar Meu Mapa Astral</a>
  <script>
    // Salva flag premium local para uso imediato
    const profile = JSON.parse(localStorage.getItem('bussolaAstral_profile') || '{}');
    profile.premiumActive = true;
    localStorage.setItem('bussolaAstral_profile', JSON.stringify(profile));
  </script>
</body>
</html>
